{% extends "base.html" %} {% block title %}Nuova transazione Lightning⚡️ -
₿eesy{% endblock %} {% block content %}

<h1>₿itcoin Lightning⚡️</h1>
<h1>➕ Nuova transazione Lightning ⚡️</h1>

<form method="post" action="/nuova_transazione_lightning">
  <label for="data">📅 Data:</label>
  <input type="date" id="data" name="data" required /><br /><br />

  <label for="wallet">👛 Wallet:</label>
  <input type="text" id="wallet" name="wallet" required /><br /><br />

  <label for="descrizione">📝 Descrizione:</label>
  <input type="text" id="descrizione" name="descrizione" required /><br /><br />

  <label for="categoria">📂 Categoria:</label>
  <select
    name="categoria"
    id="categoria"
    onchange="popolaSottocategoria()"
    required
  >
    <option value="">-- Seleziona Categoria --</option>
    {% for cat in categorie %}
    <option value="{{ cat }}">{{ cat }}</option>
    {% endfor %}</select
  ><br /><br />

  <label for="sottocategoria">🔖 Sottocategoria:</label>
  <select name="sottocategoria" id="sottocategoria" required></select
  ><br /><br />

  <label for="satoshi">⚡️ Importo (satoshi):</label>
  <input
    type="number"
    id="satoshi"
    name="satoshi"
    min="-1000000"
    max="1000000"
    required
  /><br /><br />

  <button type="submit">✅ Aggiungi</button>
</form>

<p>
  <a href="{{ url_for('transazioni_lightning') }}"
    >⬅️ Torna alle transazioni Lightning ⚡️</a
  >
</p>
<p><a href="{{ url_for('home') }}">⬅️ Torna alla Home</a></p>
<script>
  const categorie = {{ categorie_json | safe }};
  const sottocategoriaAttuale = "";

  function popolaSottocategoria() {
    const categoriaSelezionata = document.getElementById("categoria").value;
    const sottoSel = document.getElementById("sottocategoria");
    sottoSel.innerHTML = "";

    if (categorie[categoriaSelezionata]) {
      categorie[categoriaSelezionata].forEach(sotto => {
        const opt = document.createElement("option");
        opt.value = sotto;
        opt.text = sotto;
        sottoSel.appendChild(opt);
      });
    } else {
      const opt = document.createElement("option");
      opt.value = "";
      opt.text = "-- Nessuna sottocategoria --";
      sottoSel.appendChild(opt);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    popolaSottocategoria();
  });
</script>
{% endblock %}
