{% extends "base.html" %} {% block title %}Nuova transazione € - ₿eesy{% endblock %} {% block
content %}

    <h1>➕ Nuova transazione €</h1>
    <form method="post" action="{{ url_for('nuova_transazione') }}">
      <label for="data">📅 Data (YYYY-MM-DD):</label>
      <input
        type="date"
        id="data"
        name="data"
        required
        value="{{ transazione['data'] if transazione else '' }}"
      /><br /><br />

      <label for="descrizione">📝Descrizione:</label>
      <input
        type="text"
        id="descrizione"
        name="descrizione"
        required
        value="{{ transazione.descrizione if transazione else '' }}"
      /><br /><br />

      <label>Categoria:</label>
<select
  name="categoria"
  id="categoria"
  onchange="popolaSottocategoria()"
  required
>
  <option value="">-- Seleziona Categoria --</option>

  {% for cat in categorie %}
    <option
      value="{{ cat }}"
      {{ 'selected' if transazione and transazione.categoria == cat else '' }}
    >
      {{ cat }}
    </option>
  {% endfor %}
</select>
        <br /><br />
      <label>Sottocategoria:</label>
<select name="sottocategoria" id="sottocategoria" required>
  {% if transazione %}
    <option value="{{ transazione.sottocategoria }}">
      {{ transazione.sottocategoria }}
    </option>
  {% else %}
    <option value="">-- Seleziona Sottocategoria --</option>
  {% endif %}
</select>
<br /><br />

      <label for="importo">💸 Importo (€):</label>
      <input
        type="text"
        id="importo"
        name="importo"
        step="0.01"
        required
        value="{{ transazione.importo if transazione else '' }}"
      />
      <br /><br />
      <label for="conto">Conto:</label>
      <select name="conto" id="conto" required>
        <option value="BANCA">🏦 Banca</option>
        <option value="CONTANTI">💶 Contanti</option>
      </select>
      <br /><br />
      <button type="submit">✅ Aggiungi</button>
    </form>

    <p><a href="{{ url_for('transazioni') }}">⬅️ Torna alle transazioni</a></p>
    <p><a href="{{ url_for('home') }}">⬅️ Torna alla Home</a></p>
 
<script>
  const categorie = {{ categorie_json | safe }};
  const sottocategoriaAttuale = "{{ transazione['sottocategoria'] if transazione else '' }}";

  function popolaSottocategoria() {
    const categoriaSelezionata = document.getElementById("categoria").value;
    const sottoSel = document.getElementById("sottocategoria");
    sottoSel.innerHTML = "";

    if (categorie[categoriaSelezionata]) {
      categorie[categoriaSelezionata].forEach(sotto => {
        const opt = document.createElement("option");
        opt.value = sotto;
        opt.text = sotto;
        if (sotto === sottocategoriaAttuale) opt.selected = true;
        sottoSel.appendChild(opt);
      });
    } else {
      const opt = document.createElement("option");
      opt.value = "";
      opt.text = "-- Nessuna sottocategoria --";
      sottoSel.appendChild(opt);
    }
  }

  document.addEventListener("DOMContentLoaded", () => popolaSottocategoria());
</script>
{% endblock %}
